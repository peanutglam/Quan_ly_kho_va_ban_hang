<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Map cột đơn hàng</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="dashboard-bg">

<div class="page-container">
  <div class="page-card">

    <div class="page-header">
      <div>
        <h2>Map cột đơn hàng</h2>
        <p>Chọn cột trong Sheet tương ứng với dữ liệu đơn hàng.</p>
      </div>

      <a th:href="@{/sheet/flex-import}" class="btn btn-secondary">Quay lại</a>
    </div>

    <div class="alert alert-warning">
      Việc này sẽ xóa dữ liệu cũ và thay bằng dữ liệu bạn chuẩn bị đưa vào
    </div>

    <form th:action="@{/sheet/import-order}" method="post"
          onsubmit="return confirm('Việc này sẽ xóa dữ liệu cũ và thay bằng dữ liệu bạn chuẩn bị đưa vào');">

      <input type="hidden" name="sheetUrl" th:value="${sheetUrl}">
      <input type="hidden" name="gid" th:value="${gid}">

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Mã đơn hàng</label>
          <select name="orderCodeColumn" class="form-select">
            <option value="">Tự tạo nếu không có</option>
            <option th:each="h : ${headers}" th:value="${h}" th:text="${h}"></option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Tên khách hàng</label>
          <select name="customerNameColumn" class="form-select" required>
            <option th:each="h : ${headers}" th:value="${h}" th:text="${h}"></option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Số điện thoại</label>
          <select name="phoneColumn" class="form-select">
            <option value="">Bỏ trống</option>
            <option th:each="h : ${headers}" th:value="${h}" th:text="${h}"></option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Địa chỉ</label>
          <select name="addressColumn" class="form-select">
            <option value="">Bỏ trống</option>
            <option th:each="h : ${headers}" th:value="${h}" th:text="${h}"></option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Tên sản phẩm</label>
          <select name="productNameColumn" class="form-select" required>
            <option th:each="h : ${headers}" th:value="${h}" th:text="${h}"></option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Số lượng</label>
          <select name="quantityColumn" class="form-select">
            <option value="">Mặc định 1</option>
            <option th:each="h : ${headers}" th:value="${h}" th:text="${h}"></option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Trạng thái</label>
          <select name="statusColumn" class="form-select">
            <option value="">Chờ xác nhận</option>
            <option th:each="h : ${headers}" th:value="${h}" th:text="${h}"></option>
          </select>
        </div>
      </div>

      <div class="mt-4">
        <button class="btn btn-primary">Import vào đơn hàng</button>
      </div>

    </form>

  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Map cột sản phẩm</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="dashboard-bg">

<div class="page-container">
    <div class="page-card">

        <div class="page-header">
            <div>
                <h2>Map cột sản phẩm</h2>
                <p>Chọn cột trong Sheet tương ứng với dữ liệu sản phẩm.</p>
            </div>

            <a th:href="@{/sheet/flex-import}" class="btn btn-secondary">Quay lại</a>
        </div>

        <div class="alert alert-warning">
            Việc này sẽ xóa dữ liệu cũ và thay bằng dữ liệu bạn chuẩn bị đưa vào
        </div>

        <form th:action="@{/sheet/import-product}" method="post"
              onsubmit="return confirm('Việc này sẽ xóa dữ liệu cũ và thay bằng dữ liệu bạn chuẩn bị đưa vào');">

            <input type="hidden" name="sheetUrl" th:value="${sheetUrl}">
            <input type="hidden" name="gid" th:value="${gid}">

            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Mã sản phẩm</label>
                    <select name="codeColumn" class="form-select">
                        <option value="">Tự tạo nếu không có</option>
                        <option th:each="h : ${headers}" th:value="${h}" th:text="${h}"></option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Tên sản phẩm</label>
                    <select name="nameColumn" class="form-select" required>
                        <option th:each="h : ${headers}" th:value="${h}" th:text="${h}"></option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Số lượng tồn</label>
                    <select name="quantityColumn" class="form-select">
                        <option value="">Mặc định 0</option>
                        <option th:each="h : ${headers}" th:value="${h}" th:text="${h}"></option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Giá nhập</label>
                    <select name="importPriceColumn" class="form-select">
                        <option value="">Mặc định 0</option>
                        <option th:each="h : ${headers}" th:value="${h}" th:text="${h}"></option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Giá bán</label>
                    <select name="salePriceColumn" class="form-select">
                        <option value="">Mặc định 0</option>
                        <option th:each="h : ${headers}" th:value="${h}" th:text="${h}"></option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Nhà cung cấp</label>
                    <select name="supplierColumn" class="form-select">
                        <option value="">Chưa xác định</option>
                        <option th:each="h : ${headers}" th:value="${h}" th:text="${h}"></option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Hạn sử dụng / ngày nhập</label>
                    <select name="expiryDateColumn" class="form-select">
                        <option value="">Bỏ trống</option>
                        <option th:each="h : ${headers}" th:value="${h}" th:text="${h}"></option>
                    </select>
                </div>
            </div>

            <div class="mt-4">
                <button class="btn btn-primary">Import vào sản phẩm</button>
            </div>

        </form>

    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Import Google Sheet</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="dashboard-bg">

<div class="page-container">
  <div class="page-card">

    <div class="page-header">
      <div>
        <h2>Import Google Sheet linh hoạt</h2>
        <p>Nhập link sheet, chọn loại dữ liệu và map cột vào hệ thống.</p>
      </div>

      <a th:href="@{/}" class="btn btn-secondary">Về Dashboard</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/sheet/read}" method="post">
      <div class="mb-3">
        <label class="form-label">Link Google Sheet</label>
        <input type="text" name="sheetUrl" class="form-control"
               placeholder="https://docs.google.com/spreadsheets/d/..." required>
      </div>

      <div class="mb-3">
        <label class="form-label">GID của sheet</label>
        <input type="text" name="gid" class="form-control"
               placeholder="Ví dụ: 0 hoặc 1193082261" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Loại dữ liệu</label>
        <select name="type" class="form-select" required>
          <option value="PRODUCT">Sản phẩm / Kho</option>
          <option value="ORDER">Đơn hàng / Customer</option>
        </select>
      </div>

      <button class="btn btn-primary">Đọc cột trong Sheet</button>
    </form>

  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạo phiếu nhập</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="app-bg">
<div class="page-container">
    <div class="page-top-actions">
        <a class="btn btn-light btn-soft" th:href="@{/imports}">← Về danh sách</a>
    </div>

    <section class="page-card">
        <div class="page-header">
            <div>
                <h2>Tạo phiếu nhập hàng</h2>
                <p>Nhập hàng sẽ tăng tổng số lượng và tồn kho của sản phẩm</p>
            </div>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form th:action="@{/imports/create}" method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Sản phẩm</label>
                    <select class="form-select" name="productId" required>
                        <option value="">Chọn sản phẩm</option>
                        <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name + ' | Tồn: ' + p.inventoryQuantity}"></option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Nhà cung cấp</label>
                    <select class="form-select" name="supplierId" required>
                        <option value="">Chọn nhà cung cấp</option>
                        <option th:each="s : ${suppliers}" th:value="${s.id}" th:text="${s.name}"></option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Số lượng nhập</label>
                    <input type="number" class="form-control" name="quantity" min="1" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Đơn giá nhập</label>
                    <input type="number" step="0.01" class="form-control" name="importPrice" min="0" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Hạn sử dụng</label>
                    <input type="date" class="form-control" name="expiryDate">
                </div>

                <div class="col-12">
                    <label class="form-label">Ghi chú</label>
                    <textarea class="form-control" rows="3" name="note"></textarea>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary" type="submit">Lưu phiếu nhập</button>
                <a class="btn btn-light btn-soft" th:href="@{/imports}">Hủy</a>
            </div>
        </form>
    </section>
</div>
</body>
</html>

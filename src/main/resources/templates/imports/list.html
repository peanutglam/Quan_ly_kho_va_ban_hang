<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Lịch sử nhập hàng</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="app-bg">
<div class="page-container page-wide">
  <div class="page-top-actions">
    <a class="btn btn-light btn-soft" th:href="@{/}">← Về Dashboard</a>
  </div>

  <section class="page-card">
    <div class="page-header">
      <div>
        <h2>Lịch sử nhập hàng</h2>
        <p>Các phiếu nhập đã tạo</p>
      </div>
      <a class="btn btn-primary" th:href="@{/imports/create}">Tạo phiếu nhập</a>
    </div>

    <div class="table-responsive data-table-wrap">
      <table class="table table-hover align-middle data-table">
        <thead>
        <tr>
          <th>Mã phiếu</th>
          <th>Sản phẩm</th>
          <th>Nhà cung cấp</th>
          <th>Số lượng</th>
          <th>Đơn giá nhập</th>
          <th>Thành tiền</th>
          <th>Hạn sử dụng</th>
          <th>Ghi chú</th>
          <th>Ngày tạo</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(imports)}">
          <td colspan="9" class="text-center text-muted py-4">Chưa có phiếu nhập nào</td>
        </tr>
        <tr th:each="imp : ${imports}">
          <td class="fw-semibold" th:text="${imp.importCode}"></td>
          <td th:text="${imp.product != null ? imp.product.name : ''}"></td>
          <td th:text="${imp.supplier != null ? imp.supplier.name : ''}"></td>
          <td th:text="${imp.quantity}"></td>
          <td th:text="${#numbers.formatDecimal(imp.importPrice, 0, 'COMMA', 0, 'POINT')}"></td>
          <td th:text="${#numbers.formatDecimal(imp.totalAmount, 0, 'COMMA', 0, 'POINT')}"></td>
          <td th:text="${imp.expiryDate}"></td>
          <td th:text="${imp.note}"></td>
          <td th:text="${imp.createdAt}"></td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
</body>
</html>

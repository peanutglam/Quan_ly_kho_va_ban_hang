<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Thêm Employee</title>

  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="dashboard-bg">
<div class="page-container">

  <div class="page-card" style="max-width: 840px; margin: auto;">

    <div class="page-header">
      <div>
        <h2>Thêm tài khoản Employee</h2>
        <p>
          Employee này sẽ thuộc web của Owner:
          <b th:text="${workspaceOwner.fullName}">Owner</b>.
        </p>
      </div>

      <a th:href="@{/account}" class="btn btn-light btn-soft">
        Quay lại
      </a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/account/create}" method="post" th:object="${user}" autocomplete="off">
      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label">Họ tên Employee <span class="text-danger">*</span></label>
          <input type="text" th:field="*{fullName}" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Tên đăng nhập Employee <span class="text-danger">*</span></label>
          <input type="text" th:field="*{username}" class="form-control" required minlength="4">
        </div>

        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" th:field="*{email}" class="form-control">
        </div>

        <div class="col-md-6">
          <label class="form-label">Số điện thoại</label>
          <input type="text" th:field="*{phone}" class="form-control">
        </div>

        <div class="col-12">
          <label class="form-label">Địa chỉ</label>
          <input type="text" th:field="*{address}" class="form-control">
        </div>

        <div class="col-md-4">
          <label class="form-label">Vai trò Employee <span class="text-danger">*</span></label>

          <select th:field="*{role}" class="form-select" required>
            <option value="STAFF">Nhân viên kho</option>
            <option value="SALE">Nhân viên bán hàng</option>
          </select>
        </div>

        <div class="col-md-4">
          <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
          <input type="password" th:field="*{password}" class="form-control" required minlength="6">
        </div>

        <div class="col-md-4">
          <label class="form-label">Xác nhận mật khẩu <span class="text-danger">*</span></label>
          <input type="password" name="confirmPassword" class="form-control" required minlength="6">
        </div>

      </div>

      <div class="form-actions mt-4">
        <button type="submit" class="btn btn-primary">
          Lưu Employee
        </button>

        <a th:href="@{/account}" class="btn btn-secondary">
          Hủy
        </a>
      </div>
    </form>

  </div>

</div>
</body>
</html>

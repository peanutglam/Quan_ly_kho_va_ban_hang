<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Xóa tài khoản của tôi</title>

  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="dashboard-bg">
<div class="page-container">

  <div class="page-card" style="max-width: 640px; margin: auto;">

    <div class="page-header">
      <div>
        <h2>Xóa tài khoản của tôi</h2>
        <p>
          Tài khoản:
          <b th:text="${currentUser.fullName}">User</b>
          -
          <span th:text="${currentUser.roleDisplayName}">Role</span>
        </p>
      </div>

      <a th:href="@{/}" class="btn btn-light btn-soft">
        Dashboard
      </a>
    </div>

    <div class="alert alert-warning">
      Hệ thống sẽ khóa tài khoản thay vì xóa cứng để tránh mất lịch sử đơn hàng, sản phẩm và phiếu nhập.
      Nếu bạn là Owner, các Employee thuộc web của bạn cũng sẽ bị khóa.
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/account/delete-my-account}"
          method="post"
          onsubmit="return confirm('Bạn chắc chắn muốn xóa/khóa tài khoản này?');">

      <div class="mb-3">
        <label class="form-label">Nhập mật khẩu để xác nhận</label>
        <input type="password" name="password" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-danger w-100">
        Xóa/khóa tài khoản của tôi
      </button>
    </form>

  </div>

</div>
</body>
</html>

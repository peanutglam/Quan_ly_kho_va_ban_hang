<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Đổi mật khẩu</title>

  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="dashboard-bg">
<div class="page-container">

  <div class="page-card" style="max-width: 640px; margin: auto;">

    <div class="page-header">
      <div>
        <h2>Đổi mật khẩu</h2>
        <p>
          Tài khoản:
          <b th:text="${currentUser != null ? currentUser.username : ''}">username</b>
        </p>
      </div>

      <a th:href="@{/}" class="btn btn-secondary">
        Dashboard
      </a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/account/change-password}" method="post">

      <div class="mb-3">
        <label class="form-label">Mật khẩu cũ</label>
        <input type="password" name="oldPassword" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Mật khẩu mới</label>
        <input type="password" name="newPassword" class="form-control" required minlength="6">
      </div>

      <div class="mb-3">
        <label class="form-label">Xác nhận mật khẩu mới</label>
        <input type="password" name="confirmPassword" class="form-control" required minlength="6">
      </div>

      <button class="btn btn-primary w-100" type="submit">
        Đổi mật khẩu
      </button>
    </form>

  </div>

</div>
</body>
</html>

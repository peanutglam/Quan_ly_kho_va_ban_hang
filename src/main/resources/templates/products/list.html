<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quản lý sản phẩm</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="app-bg">
<div class="page-container page-wide">
  <div class="page-top-actions">
    <a class="btn btn-light btn-soft" th:href="@{/}">← Về Dashboard</a>
  </div>

  <section class="page-card">
    <div class="page-header">
      <div>
        <h2>Quản lý sản phẩm</h2>
        <p>Danh sách sản phẩm đang hoạt động</p>
      </div>
      <div class="header-actions">
        <a class="btn btn-primary" th:href="@{/products/create}">Thêm sản phẩm</a>
        <a class="btn btn-danger"
           th:href="@{/products/delete-all}"
           onclick="return confirm('Xóa toàn bộ sản phẩm đang hiển thị? Sản phẩm có đơn hàng cũ sẽ được ẩn để giữ dữ liệu an toàn.');">
          Xóa toàn bộ
        </a>
      </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form method="get" th:action="@{/products}" class="filter-bar">
      <input type="text"
             class="form-control"
             name="keyword"
             th:value="${keyword}"
             placeholder="Tìm theo mã hoặc tên sản phẩm">

      <select class="form-select" name="stockStatus">
        <option value="">Tất cả tồn kho</option>
        <option value="AVAILABLE" th:selected="${stockStatus == 'AVAILABLE'}">Còn hàng</option>
        <option value="LOW_STOCK" th:selected="${stockStatus == 'LOW_STOCK'}">Sắp hết hàng</option>
        <option value="OUT_OF_STOCK" th:selected="${stockStatus == 'OUT_OF_STOCK'}">Hết hàng</option>
      </select>

      <select class="form-select" name="expiryStatus">
        <option value="">Tất cả hạn dùng</option>
        <option value="EXPIRING_SOON" th:selected="${expiryStatus == 'EXPIRING_SOON'}">Sắp hết hạn</option>
        <option value="EXPIRED" th:selected="${expiryStatus == 'EXPIRED'}">Đã hết hạn</option>
      </select>

      <button class="btn btn-outline-primary" type="submit">Lọc</button>
    </form>

    <div class="table-responsive data-table-wrap">
      <table class="table table-hover align-middle data-table">
        <thead>
        <tr>
          <th>Mã SP</th>
          <th>Sản phẩm</th>
          <th>Danh mục</th>
          <th>Tổng SL</th>
          <th>SL xuất</th>
          <th>Tồn kho</th>
          <th>Đơn giá nhập</th>
          <th>Đơn giá bán</th>
          <th>Tổng tiền nhập</th>
          <th>Tổng tiền bán</th>
          <th>Vốn</th>
          <th>Lợi nhuận</th>
          <th>Lãi/Lỗ</th>
          <th>Hạn dùng</th>
          <th>Nhà cung cấp</th>
          <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(products)}">
          <td colspan="16" class="text-center text-muted py-4">Chưa có sản phẩm nào</td>
        </tr>
        <tr th:each="p : ${products}">
          <td class="fw-semibold" th:text="${p.code}"></td>
          <td>
            <div class="fw-semibold" th:text="${p.name}"></div>
            <div class="small text-muted" th:text="${p.brand}"></div>
          </td>
          <td th:text="${p.category}"></td>
          <td th:text="${p.totalQuantity}"></td>
          <td th:text="${p.soldQuantity}"></td>
          <td>
            <span th:classappend="${p.inventoryQuantity <= 5} ? ' bg-warning text-dark' : ' bg-success'"
                  class="badge"
                  th:text="${p.inventoryQuantity}">0</span>
          </td>
          <td th:text="${#numbers.formatDecimal(p.importPrice, 0, 'COMMA', 0, 'POINT')}"></td>
          <td th:text="${#numbers.formatDecimal(p.salePrice, 0, 'COMMA', 0, 'POINT')}"></td>
          <td th:text="${#numbers.formatDecimal(p.totalImportAmount, 0, 'COMMA', 0, 'POINT')}"></td>
          <td th:text="${#numbers.formatDecimal(p.totalSaleAmount, 0, 'COMMA', 0, 'POINT')}"></td>
          <td th:text="${#numbers.formatDecimal(p.capital, 0, 'COMMA', 0, 'POINT')}"></td>
          <td th:text="${#numbers.formatDecimal(p.profit, 0, 'COMMA', 0, 'POINT')}"></td>
          <td>
            <span class="badge"
                  th:classappend="${p.profit.signum() >= 0} ? ' bg-success' : ' bg-danger'"
                  th:text="${p.profitStatus}">Lãi</span>
          </td>
          <td th:text="${p.expiryDate}"></td>
          <td th:text="${p.supplier != null ? p.supplier.name : ''}"></td>
          <td>
            <div class="row-actions">
              <a class="btn btn-sm btn-outline-primary" th:href="@{/products/edit/{id}(id=${p.id})}">Sửa</a>
              <a class="btn btn-sm btn-outline-danger"
                 th:href="@{/products/delete/{id}(id=${p.id})}"
                 onclick="return confirm('Ẩn sản phẩm này? Dữ liệu đơn hàng cũ vẫn được giữ.');">Xóa</a>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
</body>
</html>

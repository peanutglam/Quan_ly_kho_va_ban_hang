<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Sản phẩm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="app-bg">
<div class="page-container">
    <div class="page-top-actions">
        <a class="btn btn-light btn-soft" th:href="@{/products}">← Về danh sách</a>
    </div>

    <section class="page-card">
        <div class="page-header">
            <div>
                <h2 th:text="${pageTitle}">Sản phẩm</h2>
                <p>Thông tin sản phẩm và tồn kho</p>
            </div>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form th:action="@{${formAction}}" th:object="${product}" method="post">
            <div class="form-section-title">Thông tin cơ bản</div>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Mã sản phẩm</label>
                    <input type="text" class="form-control" th:field="*{code}" maxlength="50" required>
                    <div class="text-danger small" th:errors="*{code}"></div>
                </div>

                <div class="col-md-8">
                    <label class="form-label">Tên sản phẩm</label>
                    <input type="text" class="form-control" th:field="*{name}" required>
                    <div class="text-danger small" th:errors="*{name}"></div>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Danh mục</label>
                    <input type="text" class="form-control" th:field="*{category}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Thương hiệu</label>
                    <input type="text" class="form-control" th:field="*{brand}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Nhà cung cấp</label>
                    <select class="form-select" name="supplierId">
                        <option value="">Chưa chọn</option>
                        <option th:each="s : ${suppliers}"
                                th:value="${s.id}"
                                th:text="${s.name}"
                                th:selected="${product.supplier != null and product.supplier.id == s.id}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="form-section-title mt-4">Kho và giá</div>
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Tổng số lượng</label>
                    <input type="number" class="form-control" th:field="*{totalQuantity}" min="0" required>
                    <div class="text-danger small" th:errors="*{totalQuantity}"></div>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Số lượng xuất</label>
                    <input type="number" class="form-control" th:value="${product.soldQuantity}" disabled>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Tồn kho</label>
                    <input type="number" class="form-control" th:value="${product.inventoryQuantity}" disabled>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Hạn sử dụng</label>
                    <input type="date" class="form-control" th:field="*{expiryDate}">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Đơn giá nhập</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{importPrice}" min="0">
                    <div class="text-danger small" th:errors="*{importPrice}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Đơn giá bán</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{salePrice}" min="0">
                    <div class="text-danger small" th:errors="*{salePrice}"></div>
                </div>
            </div>

            <div class="form-section-title mt-4">Ghi chú</div>
            <div class="row g-3">
                <div class="col-12">
                    <textarea class="form-control" rows="4" th:field="*{description}"></textarea>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary" type="submit">Lưu sản phẩm</button>
                <a class="btn btn-light btn-soft" th:href="@{/products}">Hủy</a>
            </div>
        </form>
    </section>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lỗi hệ thống</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="app-bg">
<div class="page-container">
    <section class="page-card" style="max-width: 760px; margin: 40px auto;">
        <div class="page-header">
            <div>
                <h2 th:text="${errorTitle != null ? errorTitle : 'Không thể xử lý yêu cầu'}">Không thể xử lý yêu cầu</h2>
                <p>
                    Mã lỗi
                    <b th:text="${status != null ? status : '500'}">500</b>
                </p>
            </div>
        </div>

        <div class="alert alert-warning" th:text="${message != null ? message : 'Vui lòng quay lại và thử lại.'}">
            Vui lòng quay lại và thử lại.
        </div>

        <p class="text-muted" th:if="${path != null}" th:text="'Đường dẫn: ' + ${path}"></p>

        <div class="form-actions">
            <a class="btn btn-primary" th:href="@{/}">Về Dashboard</a>
            <a class="btn btn-light btn-soft" th:href="@{/login}">Đăng nhập lại</a>
        </div>
    </section>
</div>
</body>
</html>

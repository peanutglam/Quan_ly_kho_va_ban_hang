<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Đơn hàng online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="app-bg">
<div class="page-container page-wide">
  <div class="page-top-actions">
    <a class="btn btn-light btn-soft" th:href="@{/}">← Về Dashboard</a>
  </div>

  <section class="page-card">
    <div class="page-header">
      <div>
        <h2>Đơn hàng online</h2>
        <p>Danh sách đơn, sản phẩm và tổng bill</p>
      </div>
      <div class="header-actions">
        <a class="btn btn-primary" th:href="@{/orders/create}">Tạo đơn hàng</a>
        <a class="btn btn-danger"
           th:href="@{/orders/delete-all}"
           onclick="return confirm('Xóa toàn bộ đơn hàng? Tồn kho của các đơn chưa hủy sẽ được hoàn lại.');">
          Xóa toàn bộ
        </a>
      </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form method="get" th:action="@{/orders}" class="filter-bar">
      <input type="text" class="form-control" name="keyword" th:value="${keyword}" placeholder="Tìm mã đơn, khách hàng hoặc số điện thoại">
      <select class="form-select" name="status">
        <option value="">Tất cả trạng thái</option>
        <option value="CHỜ_XÁC_NHẬN" th:selected="${status == 'CHỜ_XÁC_NHẬN'}">Chờ xác nhận</option>
        <option value="ĐANG_GIAO" th:selected="${status == 'ĐANG_GIAO'}">Đang giao</option>
        <option value="HOÀN_THÀNH" th:selected="${status == 'HOÀN_THÀNH'}">Hoàn thành</option>
        <option value="ĐÃ_GIAO" th:selected="${status == 'ĐÃ_GIAO'}">Đã giao</option>
        <option value="ĐÃ_HỦY" th:selected="${status == 'ĐÃ_HỦY'}">Đã hủy</option>
      </select>
      <button class="btn btn-outline-primary" type="submit">Lọc</button>
    </form>

    <div class="summary-strip mb-3">
      <span>Tổng bill cuối cùng</span>
      <strong th:text="${#numbers.formatDecimal(grandTotal, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</strong>
    </div>

    <div class="table-responsive data-table-wrap">
      <table class="table table-hover align-middle data-table">
        <thead>
        <tr>
          <th>Mã đơn</th>
          <th>Khách hàng</th>
          <th>Sản phẩm</th>
          <th>Đơn giá</th>
          <th>Thành tiền từng sản phẩm</th>
          <th>Tổng bill</th>
          <th>Trạng thái</th>
          <th>Ngày tạo</th>
          <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(orders)}">
          <td colspan="9" class="text-center text-muted py-4">Chưa có đơn hàng nào</td>
        </tr>
        <tr th:each="o : ${orders}">
          <td class="fw-semibold" th:text="${o.orderCode}"></td>
          <td>
            <div class="fw-semibold" th:text="${o.customerName}"></div>
            <div class="small text-muted" th:text="${o.customerPhone}"></div>
          </td>
          <td>
            <div class="stacked-cell" th:each="item : ${o.items}">
              <span th:text="${item.product != null ? item.product.name : 'Sản phẩm đã ẩn'}"></span>
              <small th:text="'SL: ' + ${item.quantity}"></small>
            </div>
          </td>
          <td>
            <div class="stacked-cell" th:each="item : ${o.items}"
                 th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT')}"></div>
          </td>
          <td>
            <div class="stacked-cell" th:each="item : ${o.items}"
                 th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')}"></div>
          </td>
          <td class="fw-bold" th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT')}"></td>
          <td><span class="badge bg-light text-dark border" th:text="${o.status}"></span></td>
          <td th:text="${o.createdAt}"></td>
          <td>
            <div class="row-actions">
              <a class="btn btn-sm btn-outline-primary" th:href="@{/orders/detail/{id}(id=${o.id})}">Xem</a>
              <a class="btn btn-sm btn-outline-danger"
                 th:href="@{/orders/delete/{id}(id=${o.id})}"
                 onclick="return confirm('Xóa đơn hàng này? Tồn kho sẽ được hoàn lại nếu đơn chưa hủy.');">Xóa</a>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Đăng ký Owner | SmartInventory</title>

  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="auth-bg">
<div class="auth-shell">
  <div class="auth-card auth-card-wide">

    <div class="text-center mb-4">
      <div class="brand-logo mx-auto mb-3">SI</div>

      <h2>Đăng ký tài khoản Owner</h2>

      <p class="text-muted mb-0">
        Mỗi Owner tương ứng với một web/kho riêng. Sau khi đăng ký,
        Owner có thể tạo tài khoản Employee trong hệ thống.
      </p>
    </div>

    <div class="auth-note mb-3">
      Tài khoản đăng ký tại đây là tài khoản Owner. Employee không được tự đăng ký.
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/register}" method="post" th:object="${user}" autocomplete="off">
      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label">Họ tên Owner <span class="text-danger">*</span></label>

          <input type="text"
                 th:field="*{fullName}"
                 class="form-control"
                 placeholder="Ví dụ: Nguyễn Văn A"
                 required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Tên đăng nhập Owner <span class="text-danger">*</span></label>

          <input type="text"
                 th:field="*{username}"
                 class="form-control"
                 placeholder="Ví dụ: owner_shop"
                 required
                 minlength="4">
        </div>

        <div class="col-md-6">
          <label class="form-label">Email</label>

          <input type="email"
                 th:field="*{email}"
                 class="form-control"
                 placeholder="owner@example.com">
        </div>

        <div class="col-md-6">
          <label class="form-label">Số điện thoại</label>

          <input type="text"
                 th:field="*{phone}"
                 class="form-control"
                 placeholder="0961716698">
        </div>

        <div class="col-12">
          <label class="form-label">Địa chỉ cửa hàng</label>

          <input type="text"
                 th:field="*{address}"
                 class="form-control"
                 placeholder="Địa chỉ shop/kho">
        </div>

        <div class="col-md-6">
          <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>

          <input type="password"
                 th:field="*{password}"
                 class="form-control"
                 placeholder="Tối thiểu 6 ký tự"
                 required
                 minlength="6">
        </div>

        <div class="col-md-6">
          <label class="form-label">Xác nhận mật khẩu <span class="text-danger">*</span></label>

          <input type="password"
                 name="confirmPassword"
                 class="form-control"
                 placeholder="Nhập lại mật khẩu"
                 required
                 minlength="6">
        </div>

      </div>

      <button class="btn btn-primary w-100 mt-4" type="submit">
        Tạo web Owner
      </button>
    </form>

    <div class="text-center mt-3">
      <a th:href="@{/login}">
        Đã có tài khoản? Đăng nhập
      </a>
    </div>

  </div>
</div>
</body>
</html>

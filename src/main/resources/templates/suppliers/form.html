<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Form nhà cung cấp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <div class="card shadow-sm p-4">
        <h2 class="mb-4" th:text="${pageTitle}">Form nhà cung cấp</h2>

        <form th:action="@{${formAction}}" th:object="${supplier}" method="post">
            <div class="mb-3">
                <label class="form-label">Tên nhà cung cấp</label>
                <input type="text" class="form-control" th:field="*{name}">
                <div class="text-danger small" th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Số điện thoại</label>
                <input type="text" class="form-control" th:field="*{phone}">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="text" class="form-control" th:field="*{email}">
            </div>

            <div class="mb-3">
                <label class="form-label">Địa chỉ</label>
                <input type="text" class="form-control" th:field="*{address}">
            </div>

            <div class="mb-3">
                <label class="form-label">Ghi chú</label>
                <textarea class="form-control" rows="4" th:field="*{note}"></textarea>
            </div>

            <button class="btn btn-success" type="submit">Lưu</button>
            <a class="btn btn-secondary" th:href="@{/suppliers}">Quay lại</a>
        </form>
    </div>
</div>
</body>
</html>

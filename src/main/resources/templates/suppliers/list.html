<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách nhà cung cấp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <div class="card shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>🏢 Quản lý nhà cung cấp</h2>
            <a class="btn btn-primary" th:href="@{/suppliers/create}">+ Thêm nhà cung cấp</a>
        </div>

        <table class="table table-bordered table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>SĐT</th>
                <th>Email</th>
                <th>Địa chỉ</th>
                <th width="160">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(suppliers)}">
                <td colspan="6" class="text-center text-muted">Chưa có nhà cung cấp nào</td>
            </tr>
            <tr th:each="s : ${suppliers}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.name}"></td>
                <td th:text="${s.phone}"></td>
                <td th:text="${s.email}"></td>
                <td th:text="${s.address}"></td>
                <td>
                    <a class="btn btn-sm btn-warning" th:href="@{/suppliers/edit/{id}(id=${s.id})}">Sửa</a>
                    <a class="btn btn-sm btn-danger"
                       th:href="@{/suppliers/delete/{id}(id=${s.id})}"
                       onclick="return confirm('Bạn có chắc muốn xóa nhà cung cấp này?');">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>

        <a class="btn btn-secondary" th:href="@{/}">← Về trang chủ</a>
    </div>
</div>
</body>
</html>

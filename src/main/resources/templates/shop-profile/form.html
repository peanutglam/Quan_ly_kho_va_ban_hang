<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Cấu hình hóa đơn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="app-bg">
<div class="page-container">
  <div class="page-top-actions">
    <a th:href="@{/}" class="btn btn-light btn-soft">← Về Dashboard</a>
  </div>

  <section class="page-card">
    <div class="page-header">
      <div>
        <h2>Cấu hình hóa đơn</h2>
        <p>Thông tin cửa hàng hiển thị trên bản in hóa đơn</p>
      </div>
    </div>

    <form th:action="@{/shop-profile}" method="post" th:object="${profile}">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Tên cửa hàng</label>
          <input class="form-control" th:field="*{shopName}" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Số điện thoại</label>
          <input class="form-control" th:field="*{phone}">
        </div>

        <div class="col-md-12">
          <label class="form-label">Địa chỉ</label>
          <input class="form-control" th:field="*{address}">
        </div>

        <div class="col-md-12">
          <label class="form-label">Logo hóa đơn (URL ảnh)</label>
          <input class="form-control" th:field="*{logoUrl}" placeholder="https://...">
        </div>

        <div class="col-md-12">
          <label class="form-label">Slogan / mô tả ngắn</label>
          <input class="form-control" th:field="*{slogan}">
        </div>

        <div class="col-md-12">
          <label class="form-label">Lời cảm ơn</label>
          <textarea class="form-control" rows="3" th:field="*{thankYouMessage}"></textarea>
        </div>

        <div class="col-md-12">
          <label class="form-label">Footer hóa đơn</label>
          <textarea class="form-control" rows="3" th:field="*{invoiceFooter}"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary">Lưu cấu hình</button>
      </div>
    </form>
  </section>
</div>
</body>
</html>
